services:
  postgres:
    image: postgres:13
    user: "1000:1000"
    environment: 
      POSTGRES_USER: "${PSQL_USER}"
      POSTGRES_PASSWORD: "${PSQL_PW}"
      POSTGRES_DB: "${PSQL_DB}"
    ports:
      - "5432:5432"
    volumes:
      - elephant:/var/lib/postgresql/data
  
  # Test with :9187/metrics 
  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${PSQL_USER}:${PSQL_PW}@postgres:5432/${PSQL_DB}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - postgres_exporter

  grafana:
    image: grafana/grafana
    user: "1000:1000"
    ports:
      - "3000:3000"
    volumes:
      - gurafana:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  elephant:
    name: elephant
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/lab/dee/repos_side/postgre_stresstest/data'
  gurafana:
    name: gurafana
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/lab/dee/repos_side/postgre_stresstest/grafana-data'